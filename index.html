<!DOCTYPE html>
<html>
<head>
<title>Smart Study AI</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

.summary { background: green; }
.explain { background: blue; }
.quiz { background: orange; }
.notes { background: purple; }
.prepare { background: pink; }

.output {
    background: black;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 Smart Study AI (RAG)</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<input type="text" name="topic" placeholder="Enter topic (e.g. AI, DBMS)" required>

<br>

<button class="summary" name="action" value="summary">Summary</button>
<button class="explain" name="action" value="explain">Explain</button>
<button class="quiz" name="action" value="quiz">Quiz</button>
<button class="notes" name="action" value="notes">Notes</button>
<button class="prepare" name="action" value="prepare">Prepare</button>

</form>

<hr>

<h3>Output:</h3>
<div class="output">{{ result }}</div>

</div>

</body>
</html>
